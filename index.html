<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Hybrid Cost Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#f5f7fb;
--card:#ffffff;
--text:#1f2937;
--accent:#2563eb;
}

body.dark{
--bg:#111827;
--card:#1f2937;
--text:#f3f4f6;
}

body{
background:var(--bg);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
padding:25px;
color:var(--text);
}

.container{
max-width:900px;
margin:auto;
background:var(--card);
padding:30px;
border-radius:14px;
box-shadow:0 10px 35px rgba(0,0,0,0.15);
}

h1{
margin-top:0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

label{
font-weight:600;
display:block;
margin-top:12px;
}

input[type=number]{
width:100%;
padding:8px;
margin-top:5px;
}

input[type=range]{
width:100%;
}

.results{
margin-top:30px;
padding:18px;
border-radius:10px;
background:#eef2ff;
color:#1f2937;
}

body.dark .results{
background:#374151;
color:#f3f4f6;
}

.result{
display:flex;
justify-content:space-between;
padding:6px 0;
}

.highlight{
font-weight:700;
font-size:18px;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:var(--accent);
color:white;
cursor:pointer;
}

canvas{
margin-top:35px;
}

body.dark canvas{
background:#1f2937;
border-radius:10px;
padding:10px;
}

body.dark input{
background:#374151;
color:white;
border:1px solid #555;
}

@media(max-width:700px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="container">

<h1>Hybrid Cost Calculator</h1>

<div class="buttons">
<button onclick="toggleDark()">Toggle Dark Mode</button>
<button onclick="shareLink()">Share Calculation</button>
</div>

<div class="grid">

<div>

<label>Battery Size (kWh)</label>
<input id="battery" type="number" value="12">
<input id="batterySlider" type="range" min="5" max="30" value="12">

<label>Electric Range (km)</label>
<input id="range" type="number" value="35">
<input id="rangeSlider" type="range" min="10" max="120" value="35">

<label>Electricity Price (€ / kWh)</label>
<input id="electricity" type="number" step="0.01" value="0.13">
<input id="electricitySlider" type="range" min="0.05" max="0.60" step="0.01" value="0.13">

</div>

<div>

<label>Fuel Price (€ / litre)</label>
<input id="fuelPrice" type="number" step="0.01" value="1.86">
<input id="fuelSlider" type="range" min="1" max="3" step="0.01" value="1.86">

<label>Fuel Consumption (L / 100km)</label>
<input id="fuelConsumption" type="number" value="6">
<input id="consumptionSlider" type="range" min="3" max="15" step="0.1" value="6">

<label>Annual Distance (km)</label>
<input id="annualDistance" type="number" value="15000">
<input id="distanceSlider" type="range" min="5000" max="50000" step="1000" value="15000">

</div>

</div>

<div class="results">

<div class="result"><span>Charge Cost</span><span>€ <span id="chargeCost"></span></span></div>

<div class="result"><span>Electric €/km</span><span>€ <span id="electricCost"></span></span></div>

<div class="result"><span>Petrol €/km</span><span>€ <span id="petrolCost"></span></span></div>

<div class="result highlight"><span>Savings per Charge</span><span>€ <span id="savings"></span></span></div>

<div class="result"><span>Break-even Electricity Price</span><span>€ <span id="breakeven"></span> /kWh</span></div>

<div class="result highlight"><span>Yearly Savings</span><span>€ <span id="yearly"></span></span></div>

<div class="result highlight"><span>5-Year Savings</span><span>€ <span id="fiveyear"></span></span></div>

</div>

<canvas id="chart"></canvas>

<h3>Cost vs Distance</h3>
<canvas id="distanceChart"></canvas>

<h3>Electricity Price Sensitivity</h3>
<canvas id="priceChart"></canvas>

</div>

<script>

const savedTheme = localStorage.getItem("theme")

if(savedTheme === "dark"){
document.body.classList.add("dark")
}

let chart
let distanceChart
let priceChart

function calculate(){

const battery=parseFloat(batteryInput.value)
const range=parseFloat(rangeInput.value)
const electricity=parseFloat(electricityInput.value)
const fuelPrice=parseFloat(fuelInput.value)
const consumption=parseFloat(consumptionInput.value)
const annual=parseFloat(distanceInput.value)

const chargeCost=battery*electricity
const electricCost=chargeCost/range

const petrolCost=(consumption*fuelPrice)/100

const petrolRangeCost=petrolCost*range
const savings=petrolRangeCost-chargeCost

const breakeven=(petrolCost*range)/battery

const yearly=(petrolCost-electricCost)*annual
const fiveyear=yearly*5

chargeCostEl.textContent=chargeCost.toFixed(2)
electricCostEl.textContent=electricCost.toFixed(3)
petrolCostEl.textContent=petrolCost.toFixed(3)
savingsEl.textContent=savings.toFixed(2)
breakevenEl.textContent=breakeven.toFixed(2)
yearlyEl.textContent=yearly.toFixed(0)
fiveyearEl.textContent=fiveyear.toFixed(0)

drawChart(electricCost,petrolCost)

}

function drawChart(electric,petrol){

if(chart){

chart.data.datasets[0].data=[electric,petrol]
chart.update()
return

}

function drawExtraCharts(electricCostPerKm, petrolCostPerKm){

const distancePoints=[0,5000,10000,20000,30000,40000]

const electricTotals=distancePoints.map(d=>d*electricCost)
const petrolTotals=distancePoints.map(d=>d*petrolCost)

if(distanceChart){

distanceChart.data.datasets[0].data=electricTotals
distanceChart.data.datasets[1].data=petrolTotals
distanceChart.update()

}else{

distanceChart=new Chart(document.getElementById("distanceChart"),{

type:"line",

data:{
labels:distancePoints,
datasets:[
{
label:"Electric Cost",
data:electricTotals,
borderColor:"#22c55e",
fill:false
},
{
label:"Petrol Cost",
data:petrolTotals,
borderColor:"#ef4444",
fill:false
}
]
},

options:{
responsive:true,
plugins:{legend:{display:true}},
scales:{
x:{title:{display:true,text:"Distance (km)"}},
y:{title:{display:true,text:"Total Cost (€)"}}
}

}

})

}

const priceRange=[0.05,0.10,0.15,0.20,0.25,0.30,0.40,0.50]

const electricCosts=priceRange.map(p=>{
return (battery.value * p) / rangeEl.value
})

const petrolLine=priceRange.map(()=>petrolCost)

if(priceChart){

priceChart.data.datasets[0].data=electricCosts
priceChart.data.datasets[1].data=petrolLine
priceChart.update()

}else{

priceChart=new Chart(document.getElementById("priceChart"),{

type:"line",

data:{
labels:priceRange,
datasets:[
{
label:"Electric Cost/km",
data:electricCosts,
borderColor:"#22c55e",
fill:false
},
{
label:"Petrol Cost/km",
data:petrolLine,
borderColor:"#ef4444",
fill:false
}
]
},

options:{
responsive:true,
plugins:{legend:{display:true}},
scales:{
x:{title:{display:true,text:"Electricity Price €/kWh"}},
y:{title:{display:true,text:"Cost €/km"}}
}

}

})

}

}

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Electric €/km","Petrol €/km"],
datasets:[{
data:[electric,petrol],
backgroundColor:["#22c55e","#ef4444"]
}]
},

options:{
plugins:{legend:{display:false}},
responsive:true
}

})

}

function toggleDark(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark")
}else{
localStorage.setItem("theme","light")
}

}

function shareLink(){

const params=new URLSearchParams({

battery:batteryInput.value,
range:rangeInput.value,
electricity:electricityInput.value,
fuel:fuelInput.value,
consumption:consumptionInput.value,
distance:distanceInput.value

})

const url=location.origin+location.pathname+"?"+params

navigator.clipboard.writeText(url)

alert("Shareable link copied")

}

function loadFromURL(){

const params=new URLSearchParams(window.location.search)

if(!params.has("battery")) return

batteryInput.value=params.get("battery")
rangeInput.value=params.get("range")
electricityInput.value=params.get("electricity")
fuelInput.value=params.get("fuel")
consumptionInput.value=params.get("consumption")
distanceInput.value=params.get("distance")

}

function sync(input,slider){

input.addEventListener("input",()=>{
slider.value=input.value
calculate()
})

slider.addEventListener("input",()=>{
input.value=slider.value
calculate()
})

}

const batteryInput=document.getElementById("battery")
const rangeInput=document.getElementById("range")
const electricityInput=document.getElementById("electricity")
const fuelInput=document.getElementById("fuelPrice")
const consumptionInput=document.getElementById("fuelConsumption")
const distanceInput=document.getElementById("annualDistance")

const chargeCostEl=document.getElementById("chargeCost")
const electricCostEl=document.getElementById("electricCost")
const petrolCostEl=document.getElementById("petrolCost")
const savingsEl=document.getElementById("savings")
const breakevenEl=document.getElementById("breakeven")
const yearlyEl=document.getElementById("yearly")
const fiveyearEl=document.getElementById("fiveyear")

sync(batteryInput,batterySlider)
sync(rangeInput,rangeSlider)
sync(electricityInput,electricitySlider)
sync(fuelInput,fuelSlider)
sync(consumptionInput,consumptionSlider)
sync(distanceInput,distanceSlider)

loadFromURL()

calculate()

</script>

</body>
</html>
