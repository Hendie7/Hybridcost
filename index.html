```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plug-in Hybrid Running Cost Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f3f4f6;
color:#111827;
margin:0;
padding:40px;
transition:0.3s;
}

body.dark{
background:#111827;
color:#f9fafb;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:10px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:25px;
}

body.dark .card{
background:#1f2937;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

body.dark input{
background:#374151;
color:white;
border:1px solid #555;
}

.results{
margin-top:20px;
padding:15px;
border-radius:8px;
background:#eef2ff;
}

body.dark .results{
background:#374151;
color:#f3f4f6;
}

button{
margin-top:20px;
padding:10px 15px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

canvas{
margin-top:30px;
}

.darkToggle{
float:right;
cursor:pointer;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Plug-in Hybrid Cost Calculator</h1>

<div class="darkToggle" onclick="toggleDark()">Toggle Dark Mode</div>

<div class="card">

<label>Battery Size (kWh)</label>
<input id="battery" type="number" value="12">

<label>Electric Range (km)</label>
<input id="range" type="number" value="35">

<label>Electricity Price (€ / kWh)</label>
<input id="electricPrice" type="number" step="0.01" value="0.13">

<label>Fuel Price (€ / litre)</label>
<input id="fuelPrice" type="number" step="0.01" value="1.86">

<label>Fuel Consumption (L / 100km)</label>
<input id="consumption" type="number" step="0.1" value="6">

<label>Annual Distance (km)</label>
<input id="distance" type="number" value="15000">

<button onclick="calculate()">Calculate</button>

<div class="results" id="results"></div>

</div>

<div class="card">

<h3>Cost per km</h3>
<canvas id="costChart"></canvas>

<h3>Cumulative Cost vs Distance</h3>
<canvas id="distanceChart"></canvas>

<h3>Electricity Price Sensitivity</h3>
<canvas id="priceChart"></canvas>

</div>

</div>

<script>

let costChart
let distanceChart
let priceChart

function calculate(){

const battery=parseFloat(document.getElementById("battery").value)
const range=parseFloat(document.getElementById("range").value)
const electricPrice=parseFloat(document.getElementById("electricPrice").value)
const fuelPrice=parseFloat(document.getElementById("fuelPrice").value)
const consumption=parseFloat(document.getElementById("consumption").value)
const annualDistance=parseFloat(document.getElementById("distance").value)

const electricCostPerCharge=battery*electricPrice
const electricCostPerKm=electricCostPerCharge/range

const petrolCostPerKm=(consumption/100)*fuelPrice

const yearlyElectric=electricCostPerKm*annualDistance
const yearlyPetrol=petrolCostPerKm*annualDistance

const savings=yearlyPetrol-yearlyElectric

const breakEven=(petrolCostPerKm*range)/battery

document.getElementById("results").innerHTML=

`
Electric cost per km: €${electricCostPerKm.toFixed(3)} <br>
Petrol cost per km: €${petrolCostPerKm.toFixed(3)} <br><br>

Electric yearly cost: €${yearlyElectric.toFixed(0)} <br>
Petrol yearly cost: €${yearlyPetrol.toFixed(0)} <br><br>

Yearly savings: €${savings.toFixed(0)} <br>
5 year savings: €${(savings*5).toFixed(0)} <br><br>

Break-even electricity price: €${breakEven.toFixed(2)} / kWh
`

drawCostChart(electricCostPerKm,petrolCostPerKm)
drawDistanceChart(electricCostPerKm,petrolCostPerKm)
drawPriceChart(petrolCostPerKm,battery,range)

}

function drawCostChart(electric,petrol){

const data=[electric,petrol]

if(costChart){

costChart.data.datasets[0].data=data
costChart.update()
return

}

costChart=new Chart(document.getElementById("costChart"),{

type:"bar",

data:{
labels:["Electric","Petrol"],
datasets:[{
label:"Cost per km (€)",
data:data
}]
},

options:{responsive:true}

})

}

function drawDistanceChart(electricCost,petrolCost){

const distances=[0,5000,10000,20000,30000,40000]

const electricTotals=distances.map(d=>d*electricCost)
const petrolTotals=distances.map(d=>d*petrolCost)

if(distanceChart){

distanceChart.data.datasets[0].data=electricTotals
distanceChart.data.datasets[1].data=petrolTotals
distanceChart.update()
return

}

distanceChart=new Chart(document.getElementById("distanceChart"),{

type:"line",

data:{
labels:distances,
datasets:[
{
label:"Electric",
data:electricTotals,
borderColor:"#22c55e",
fill:false
},
{
label:"Petrol",
data:petrolTotals,
borderColor:"#ef4444",
fill:false
}
]
},

options:{responsive:true}

})

}

function drawPriceChart(petrolCost,battery,range){

const prices=[0.05,0.10,0.15,0.20,0.25,0.30,0.40,0.50]

const electricCosts=prices.map(p=>(battery*p)/range)

const petrolLine=prices.map(()=>petrolCost)

if(priceChart){

priceChart.data.datasets[0].data=electricCosts
priceChart.update()
return

}

priceChart=new Chart(document.getElementById("priceChart"),{

type:"line",

data:{
labels:prices,
datasets:[
{
label:"Electric Cost/km",
data:electricCosts,
borderColor:"#22c55e",
fill:false
},
{
label:"Petrol Cost/km",
data:petrolLine,
borderColor:"#ef4444",
fill:false
}
]
},

options:{responsive:true}

})

}

function toggleDark(){

document.body.classList.toggle("dark")

if(document.body.classList.contains("dark")){
localStorage.setItem("theme","dark")
}else{
localStorage.setItem("theme","light")
}

}

const savedTheme=localStorage.getItem("theme")

if(savedTheme==="dark"){
document.body.classList.add("dark")
}

calculate()

</script>

</body>
</html>
```
