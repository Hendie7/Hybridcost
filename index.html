<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hybrid Cost Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#f5f7fb;
margin:0;
padding:20px;
color:#222;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 6px 25px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
font-size:28px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

label{
font-weight:600;
display:block;
margin-top:18px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.results{
margin-top:30px;
background:#f0f4ff;
padding:18px;
border-radius:10px;
}

.result{
display:flex;
justify-content:space-between;
padding:6px 0;
}

.highlight{
font-weight:700;
font-size:18px;
}

canvas{
margin-top:30px;
}

.footer{
margin-top:20px;
font-size:12px;
color:#888;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Hybrid Cost Calculator</h1>
<div class="subtitle">Compare electric vs petrol running costs</div>

<label>Battery Size (kWh)</label>
<input id="battery" type="number" value="12">

<label>Electric Range per Charge (km)</label>
<input id="range" type="number" value="35">

<label>Electricity Price (€ / kWh)</label>
<input id="electricity" type="number" step="0.01" value="0.13">

<label>Fuel Price (€ / litre)</label>
<input id="fuelPrice" type="number" step="0.01" value="1.86">

<label>Fuel Consumption (L / 100 km)</label>
<input id="fuelConsumption" type="number" step="0.1" value="5.6">

<label>Annual Distance (km)</label>
<input id="annualDistance" type="number" value="15000">

<div class="results">

<div class="result">
<span>Charge Cost</span>
<span>€ <span id="chargeCost"></span></span>
</div>

<div class="result">
<span>Electric Cost per km</span>
<span>€ <span id="electricCost"></span></span>
</div>

<div class="result">
<span>Petrol Cost per km</span>
<span>€ <span id="petrolCost"></span></span>
</div>

<div class="result">
<span>Cost of 1 Electric Range on Petrol</span>
<span>€ <span id="petrolRangeCost"></span></span>
</div>

<div class="result highlight">
<span>Savings per Charge</span>
<span>€ <span id="savings"></span></span>
</div>

<div class="result">
<span>Break-even Electricity Price</span>
<span>€ <span id="breakeven"></span> /kWh</span>
</div>

<div class="result highlight">
<span>Estimated Yearly Savings</span>
<span>€ <span id="yearly"></span></span>
</div>

</div>

<canvas id="costChart"></canvas>

<div class="footer">
Hybrid Cost Calculator
</div>

</div>

<script>

let chart

function calculate(){

const battery=parseFloat(document.getElementById("battery").value)||0
const range=parseFloat(document.getElementById("range").value)||0
const electricity=parseFloat(document.getElementById("electricity").value)||0
const fuelPrice=parseFloat(document.getElementById("fuelPrice").value)||0
const fuelConsumption=parseFloat(document.getElementById("fuelConsumption").value)||0
const annualDistance=parseFloat(document.getElementById("annualDistance").value)||0

const chargeCost=battery*electricity
const electricCostPerKm=range?chargeCost/range:0

const petrolCostPer100=fuelConsumption*fuelPrice
const petrolCostPerKm=petrolCostPer100/100

const petrolRangeCost=petrolCostPerKm*range
const savings=petrolRangeCost-chargeCost

const breakeven=(petrolCostPerKm*range)/battery

const yearlySavings=(petrolCostPerKm-electricCostPerKm)*annualDistance

document.getElementById("chargeCost").textContent=chargeCost.toFixed(2)
document.getElementById("electricCost").textContent=electricCostPerKm.toFixed(3)
document.getElementById("petrolCost").textContent=petrolCostPerKm.toFixed(3)
document.getElementById("petrolRangeCost").textContent=petrolRangeCost.toFixed(2)
document.getElementById("savings").textContent=savings.toFixed(2)
document.getElementById("breakeven").textContent=breakeven.toFixed(2)
document.getElementById("yearly").textContent=yearlySavings.toFixed(0)

drawChart(electricCostPerKm,petrolCostPerKm)

}

function drawChart(electric,petrol){

const data={
labels:["Electric","Petrol"],
datasets:[{
label:"Cost per km (€)",
data:[electric,petrol],
backgroundColor:["#2ecc71","#e74c3c"]
}]
}

if(chart){
chart.data.datasets[0].data=[electric,petrol]
chart.update()
return
}

const ctx=document.getElementById("costChart")

chart=new Chart(ctx,{
type:"bar",
data:data,
options:{
responsive:true,
plugins:{
legend:{display:false}
},
scales:{
y:{
beginAtZero:true,
title:{
display:true,
text:"Cost (€ / km)"
}
}
}
}
})

}

document.querySelectorAll("input").forEach(input=>{
input.addEventListener("input",calculate)
})

window.onload=calculate

</script>

</body>
</html>
